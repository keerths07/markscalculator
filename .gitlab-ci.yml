image: python:3.11

stages:
  - quality

before_script:
  - pip install -r requirements.txt

ruff:
  stage: quality
  script:
    - ruff check .

mypy:
  stage: quality
  script:
    - mypy .

bandit:
  stage: quality
  script:
    - bandit -r .

flake8:
  stage: quality
  script:
    - flake8 .

pylint:
  stage: quality
  script:
    - pylint app.py

vulture:
  stage: quality
  script:
    - vulture .

semgrep:
  stage: quality
  script:
    - semgrep scan .

pyupgrade:
  stage: quality
  script:
    - python -m pyupgrade --py311-plus app.py

dependency_audit:
  stage: quality
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt

gitleaks:
  stage: quality
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose