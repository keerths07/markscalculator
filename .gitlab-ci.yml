image: python:3.11

stages:
  - test
  - lint
  - format
  - type_check
  - coverage
  - security

before_script:
  - pip install --upgrade pip
  - pip install -r requirements.txt

# ---------------- TEST ----------------
test:
  stage: test
  script:
    - pip install pytest
    - pytest -v

# ---------------- LINT ----------------
ruff:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

flake8:
  stage: lint
  script:
    - pip install flake8
    - flake8 .

pylint:
  stage: lint
  script:
    - pip install pylint
    - pylint backend frontend

bandit:
  stage: lint
  script:
    - pip install bandit
    - bandit -r backend

vulture:
  stage: lint
  script:
    - pip install vulture
    - vulture backend frontend

semgrep:
  stage: lint
  script:
    - pip install semgrep
    - semgrep --config auto backend

# ---------------- SECURITY SCAN ----------------
gitleaks:
  stage: lint
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose

# ---------------- FORMAT ----------------
pyupgrade:
  stage: format
  script:
    - pip install pyupgrade
    - pyupgrade --py311-plus backend frontend

# ---------------- TYPE CHECK ----------------
mypy:
  stage: type_check
  script:
    - pip install mypy types-requests
    - mypy backend frontend

# ---------------- COVERAGE ----------------
coverage:
  stage: coverage
  script:
    - pip install pytest coverage
    - coverage run -m pytest
    - coverage report
dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install --upgrade pip
    - pip install pip-audit
    - pip-audit --strict