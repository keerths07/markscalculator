image: python:3.11

stages:
  - test
  - lint
  - format
  - type_check
  - coverage

before_script:
  - pip install -r requirements.txt

test:
  stage: test
  script:
    - python -m unittest discover

ruff:
  stage: lint
  script:
    - ruff check .

flake8:
  stage: lint
  script:
    - flake8 .

bandit:
  stage: lint
  script:
    - bandit -r .

gitleaks:
  stage: lint
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose

pyupgrade:
  stage: format
  script:
    - python -m pyupgrade --py311-plus app.py

mypy:
  stage: type_check
  script:
    - mypy .

coverage:
  stage: coverage
  script:
    - echo "Coverage stage configured"

dependency_audit:
  stage: coverage
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt